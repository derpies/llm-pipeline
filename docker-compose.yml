networks:
  llmpipe-net:

volumes:
  llmpipe-pgdata:
  llmpipe-redisdata:
  llmpipe-uv-cache:
  llmpipe-weaviate:

services:
  app:
    container_name: llmpipe-app
    build: .
    volumes:
      - .:/app
      - llmpipe-uv-cache:/root/.cache/uv
      - ./raw-logs:/data/raw-logs:ro
      - ./output:/data/output
    env_file:
      - .env
    ports:
      - "20000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: sleep infinity
    networks:
      - llmpipe-net

  api:
    container_name: llmpipe-api
    build: .
    volumes:
      - .:/app
      - llmpipe-uv-cache:/root/.cache/uv
      - ./output:/data/output
    env_file:
      - .env
    ports:
      - "20005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    command: uv run uvicorn llm_pipeline.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - llmpipe-net

  postgres:
    container_name: llmpipe-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: llm_pipeline
      POSTGRES_PASSWORD: llm_pipeline
      POSTGRES_DB: llm_pipeline
    ports:
      - "20001:5432"
    volumes:
      - llmpipe-pgdata:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_pipeline -d llm_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - llmpipe-net

  weaviate:
    container_name: llmpipe-weaviate
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    ports:
      - "20003:8080"
      - "20004:50051"
    volumes:
      - llmpipe-weaviate:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - llmpipe-net

  redis:
    container_name: llmpipe-redis
    image: redis:7-alpine
    ports:
      - "20002:6379"
    volumes:
      - llmpipe-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - llmpipe-net

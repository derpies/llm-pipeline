services:
  app:
    build: .
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv
    env_file:
      - .env
    ports:
      - "20000:8000"
    depends_on:
      - postgres
      - redis
    stdin_open: true
    tty: true
    command: sleep infinity  # Keep alive for exec usage

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: llm_pipeline
      POSTGRES_PASSWORD: llm_pipeline
      POSTGRES_DB: llm_pipeline
    ports:
      - "20001:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "20002:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  uv-cache:
